services:
  postgres:
    image: postgres:18.3
    container_name: comic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comics_db}
      POSTGRES_USER: ${POSTGRES_USER:-comic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comic}
    ports:
      - "5432:5432"
    volumes:
      - comic_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-app-1
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-comics_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-comic}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-comic}

      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-true}

      APP_UPLOAD_ROOT: /mnt/uploads

      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-translation-key.json

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}

      APP_MAIL_FROM: ${APP_MAIL_FROM:-comix.universe.website}
      APP_RESET_CODE_EXPIRATION_MINUTES: ${APP_RESET_CODE_EXPIRATION_MINUTES:-10}
      APP_RESET_MAX_ATTEMPTS: ${APP_RESET_MAX_ATTEMPTS:-5}

      OCRSPACE_API_KEY: ${OCRSPACE_API_KEY:-}
      OCRSPACE_MONTHLY_REQUEST_LIMIT: ${OCRSPACE_MONTHLY_REQUEST_LIMIT:-25000}

      GCP_TRANSLATION_PROJECT_ID: ${GCP_TRANSLATION_PROJECT_ID:-}
      GCP_TRANSLATION_LOCATION: ${GCP_TRANSLATION_LOCATION:-global}
      GCP_TRANSLATION_MONTHLY_CHAR_LIMIT: ${GCP_TRANSLATION_MONTHLY_CHAR_LIMIT:-500000}
      GCP_TRANSLATION_ESTIMATED_CHARS_PER_PAGE: ${GCP_TRANSLATION_ESTIMATED_CHARS_PER_PAGE:-3500}

      AUTOTRANSLATION_DEBUG: ${AUTOTRANSLATION_DEBUG:-false}
    volumes:
      - ./docker/uploads:/mnt/uploads
      - ./secrets/google-translation-key.json:/run/secrets/google-translation-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-app-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-comics_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-comic}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-comic}

      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-true}

      APP_UPLOAD_ROOT: /mnt/uploads

      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-translation-key.json

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}

      APP_MAIL_FROM: ${APP_MAIL_FROM:-comix.universe.website}
      APP_RESET_CODE_EXPIRATION_MINUTES: ${APP_RESET_CODE_EXPIRATION_MINUTES:-10}
      APP_RESET_MAX_ATTEMPTS: ${APP_RESET_MAX_ATTEMPTS:-5}

      OCRSPACE_API_KEY: ${OCRSPACE_API_KEY:-}
      OCRSPACE_MONTHLY_REQUEST_LIMIT: ${OCRSPACE_MONTHLY_REQUEST_LIMIT:-25000}

      GCP_TRANSLATION_PROJECT_ID: ${GCP_TRANSLATION_PROJECT_ID:-}
      GCP_TRANSLATION_LOCATION: ${GCP_TRANSLATION_LOCATION:-global}
      GCP_TRANSLATION_MONTHLY_CHAR_LIMIT: ${GCP_TRANSLATION_MONTHLY_CHAR_LIMIT:-500000}
      GCP_TRANSLATION_ESTIMATED_CHARS_PER_PAGE: ${GCP_TRANSLATION_ESTIMATED_CHARS_PER_PAGE:-3500}

      AUTOTRANSLATION_DEBUG: ${AUTOTRANSLATION_DEBUG:-false}
    volumes:
      - ./docker/uploads:/mnt/uploads
      - ./secrets/google-translation-key.json:/run/secrets/google-translation-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    container_name: comic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/uploads:/mnt/uploads:ro
    depends_on:
      - app-1
      - app-2

volumes:
  comic_postgres_data: