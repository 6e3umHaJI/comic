worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    client_max_body_size 250m;

    upstream comic_backend {
        server app-1:8080 max_fails=3 fail_timeout=15s;
        server app-2:8080 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 80;
        server_name _;

        location /assets/covers/ {
            alias /mnt/uploads/covers/;
            try_files $uri @comic_app;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /assets/pages/ {
            alias /mnt/uploads/pages/;
            try_files $uri @comic_app;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            proxy_pass http://comic_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location @comic_app {
            proxy_pass http://comic_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}