server.port=8080
server.forward-headers-strategy=framework

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/comics_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:comic}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:comic}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.jakarta.persistence.validation.mode=none
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.schemas=public

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.session.timeout=30m

spring.servlet.multipart.location=${java.io.tmpdir}
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=220MB
spring.servlet.multipart.file-size-threshold=0
server.tomcat.max-part-count=400
server.tomcat.max-swallow-size=-1

management.endpoints.web.exposure.include=*
spring.web.resources.add-mappings=true
server.error.whitelabel.enabled=false
spring.mvc.log-resolved-exception=false

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.from=${APP_MAIL_FROM:comix.universe.website}
app.reset.code-expiration-minutes=${APP_RESET_CODE_EXPIRATION_MINUTES:10}
app.reset.max-attempts=${APP_RESET_MAX_ATTEMPTS:5}

ocrspace.api.key=${OCRSPACE_API_KEY:}
ocrspace.monthly-request-limit=${OCRSPACE_MONTHLY_REQUEST_LIMIT:25000}

gcp.translation.project-id=${GCP_TRANSLATION_PROJECT_ID:}
gcp.translation.location=${GCP_TRANSLATION_LOCATION:global}
gcp.translation.monthly-char-limit=${GCP_TRANSLATION_MONTHLY_CHAR_LIMIT:500000}
gcp.translation.estimated-chars-per-page=${GCP_TRANSLATION_ESTIMATED_CHARS_PER_PAGE:3500}

autotranslation.debug=${AUTOTRANSLATION_DEBUG:false}

app.upload.root=${APP_UPLOAD_ROOT:/mnt/uploads}
app.upload.covers-dir=covers
app.upload.pages-dir=pages
